name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create artefacts
        run: |
          tar cvzf favgen-${{ github.ref_name }}.tar.gz fn_generate_favicons LICENSE README.md
          zip favgen-${{ github.ref_name }}.zip fn_generate_favicons LICENSE README.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            favgen-${{ github.ref_name }}.tar.gz
            favgen-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
